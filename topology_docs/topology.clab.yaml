name: lab_topology
topology:
  nodes:
    ubuntu1:
      kind: generic_vm
      image: vrnetlab/canonical_ubuntu:jammy
    ubuntu2:
      kind: generic_vm
      image: vrnetlab/canonical_ubuntu:jammy
    cisco1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: |
        ip domain name lab.local
        hostname cisco1
        crypto key generate rsa modulus 2048
        ip ssh version 2
        ip ssh time-out 60
        ip ssh authentication-retries 2
        username admin privilege 15 secret admin
        ip ssh pubkey-chain
        username admin
        key-hash ssh-rsa 9C6B8FFDD78F4C88C33114AD7F1C95C9
        exit
        exit
    cisco2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: |
        ip domain name lab.local
        hostname cisco2
        crypto key generate rsa modulus 2048
        ip ssh version 2
        ip ssh time-out 60
        ip ssh authentication-retries 2
        username admin privilege 15 secret admin
        ip ssh pubkey-chain
        username admin
        key-hash ssh-rsa 9C6B8FFDD78F4C88C33114AD7F1C95C9
        exit
        exit
  links:
    - endpoints: ["cisco1:Ethernet0/2", "ubuntu1:eth1"]  
    - endpoints: ["cisco1:Ethernet0/1","cisco2:Ethernet0/1"] 
    - endpoints: ["cisco2:Ethernet0/2", "ubuntu2:eth1"]  